<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fabled</title>
  <meta name="description" content="Fabled — coming soon." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --fg: #f5f0eb;
      --muted: #888;
      --accent: #fff;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    .wordmark {
      font-size: clamp(3rem, 12vw, 7rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--fg);
      line-height: 1;
    }

    .tagline {
      margin-top: 1.25rem;
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .waitlist {
      margin-top: 2rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .waitlist input {
      background: transparent;
      border: 1px solid #333;
      border-radius: 6px;
      color: var(--fg);
      font-size: 0.9rem;
      padding: 0.6rem 1rem;
      width: 220px;
      outline: none;
      transition: border-color 0.2s;
    }

    .waitlist input::placeholder {
      color: var(--muted);
    }

    .waitlist input:focus {
      border-color: var(--accent);
    }

    .waitlist button {
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #0a0a0a;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.6rem 1.1rem;
      white-space: nowrap;
      transition: opacity 0.2s;
    }

    .waitlist button:hover {
      opacity: 0.85;
    }

    .consent {
      width: 100%;
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: left;
      justify-content: center;
      margin-top: 0.25rem;
    }

    .consent input[type="checkbox"] {
      margin-top: 2px;
      flex-shrink: 0;
      accent-color: var(--accent);
      width: auto;
    }

    .consent a {
      color: var(--muted);
      text-decoration: underline;
    }

    .consent a:hover {
      color: var(--fg);
    }

    footer {
      position: fixed;
      bottom: 2rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    footer a {
      color: var(--muted);
      text-decoration: none;
    }

    footer a:hover {
      color: var(--fg);
    }

    .footer-links {
      margin-top: 0.4rem;
    }
  </style>
</head>
<body>

  <main>
    <div class="wordmark">Fabled</div>
    <p class="tagline">Get notified when Fabled launches</p>
    <form class="waitlist" name="waitlist" method="POST" action="/thank-you.html" data-netlify="true" data-netlify-honeypot="bot-field">
      <input type="hidden" name="form-name" value="waitlist" />
      <p style="display:none"><label>Don't fill this out: <input name="bot-field" /></label></p>
      <input type="email" name="email" placeholder="email" autocomplete="email" required />
      <button type="submit">Join the waitlist &rsaquo;</button>
      <label class="consent">
        <input type="checkbox" required />
        I agree to receive updates about Fabled. See our <a href="/privacy-policy.html">Privacy Policy</a>.
      </label>
    </form>
  </main>

  <footer>
    <a href="mailto:hello@fabled.co">hello@fabled.co</a>
    <div class="footer-links">
      <a href="/privacy-policy.html">Privacy Policy</a>
      &nbsp;&middot;&nbsp;
      &copy; 2026 Fabled SL. All Rights Reserved
    </div>
  </footer>

</body>
</html>
