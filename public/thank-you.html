<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're on the list — Fabled</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --fg: #f5f0eb;
      --muted: #888;
      --accent: #c8a96e;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    .wordmark {
      font-size: clamp(3rem, 12vw, 7rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--fg);
      line-height: 1;
    }

    .message {
      margin-top: 1.25rem;
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .sub {
      margin-top: 0.75rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    footer {
      position: fixed;
      bottom: 2rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    footer a {
      color: var(--muted);
      text-decoration: none;
    }

    footer a:hover {
      color: var(--fg);
    }

    .footer-links {
      margin-top: 0.4rem;
    }
  </style>
</head>
<body>

  <main>
    <div class="wordmark">Fabled</div>
    <p class="message">You're on the list</p>
    <p class="sub">We'll be in touch when we launch.</p>
  </main>

  <footer>
    <a href="mailto:hello@fabled.co">hello@fabled.co</a>
    <div class="footer-links">
      <a href="/privacy-policy.html">Privacy Policy</a>
      &nbsp;&middot;&nbsp;
      &copy; 2026 Fabled SL. All Rights Reserved
    </div>
  </footer>

</body>
</html>
